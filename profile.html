{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-1">Company Profile</h2>
                        <p class="text-secondary mb-0">Update company details. Rejected profiles are resubmitted for admin review.</p>
                    </div>
                    <a class="btn btn-outline-secondary" href="{{ url_for('company.dashboard') }}">Back</a>
                </div>
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Company Name</label>
                            <input class="form-control" type="text" name="company_name" value="{{ company.company_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">HR Contact</label>
                            <input class="form-control" type="text" name="hr_contact" value="{{ company.hr_contact }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Website</label>
                            <input class="form-control" type="url" name="website" value="{{ company.website or '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="5" name="description">{{ company.description or '' }}</textarea>
                        </div>
                    </div>
                    <button class="btn btn-primary mt-4">Save Company Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
