{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-1">Student Profile</h2>
                        <p class="text-secondary mb-0">Update your academic details and upload your resume.</p>
                    </div>
                    <a class="btn btn-outline-secondary" href="{{ url_for('student.dashboard') }}">Back</a>
                </div>
                <form method="post" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input class="form-control" type="text" name="full_name" value="{{ profile.full_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Roll Number</label>
                            <input class="form-control" type="text" value="{{ profile.roll_number }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contact Number</label>
                            <input class="form-control" type="text" name="contact_number" value="{{ profile.contact_number }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <input class="form-control" type="text" name="department" value="{{ profile.department }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">CGPA</label>
                            <input class="form-control" type="number" step="0.01" min="0" max="10" name="cgpa" value="{{ profile.cgpa }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Graduation Year</label>
                            <input class="form-control" type="number" name="graduation_year" value="{{ profile.graduation_year }}" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Skills</label>
                            <textarea class="form-control" rows="4" name="skills">{{ profile.skills }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Resume Upload</label>
                            <input class="form-control" type="file" name="resume" accept=".pdf,.doc,.docx">
                            {% if profile.resume_filename %}
                                <div class="small text-secondary mt-2">Current resume: {{ profile.resume_filename }}</div>
                            {% endif %}
                        </div>
                    </div>
                    <button class="btn btn-primary mt-4">Save Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
