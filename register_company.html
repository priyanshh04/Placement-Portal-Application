{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="fw-bold mb-4">Company Registration</h2>
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Company Name</label>
                            <input class="form-control" type="text" name="company_name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">HR Contact</label>
                            <input class="form-control" type="text" name="hr_contact" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input class="form-control" type="email" name="email" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Password</label>
                            <input class="form-control" type="password" name="password" required minlength="6">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Website</label>
                            <input class="form-control" type="url" name="website">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Company Description</label>
                            <textarea class="form-control" rows="4" name="description"></textarea>
                        </div>
                    </div>
                    <button class="btn btn-primary mt-4">Submit for Approval</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
